name: Release

on:
  release:
    types: [ published ]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish runtime to Maven Central
        run: ./gradlew :kmp-parcelize-runtime:publishAllPublicationsToMavenCentralRepository

      - name: Publish plugin to Maven Central
        working-directory: kmp-parcelize-plugin
        run: ../gradlew publishAllPublicationsToMavenCentralRepository

      - name: Publish plugin to Gradle Plugin Portal
        working-directory: kmp-parcelize-plugin
        run: ../gradlew publishPlugins
